name: Commitlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - run: |
          npx commitlint --from "${{ github.event.pull_request.base.sha }}" \
                         --to "${{ github.event.pull_request.head.sha }}" \
                         --verbose
