name: Sync personal to org mirror

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - canonical-push

permissions:
  contents: read

concurrency:
  group: sync-personal-to-org-mirror
  cancel-in-progress: false

jobs:
  mirror-personal-to-org:
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Force mirror personal refs to org
        env:
          MIRROR_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          SOURCE_REPO: oaslananka/kicad-mcp-pro
          TARGET_REPO: oaslananka-lab/kicad-mcp-pro
        run: |
          set -Eeuo pipefail

          if [ -z "${MIRROR_TOKEN:-}" ]; then
            echo "::error::DOPPLER_GITHUB_SERVICE_TOKEN is required."
            exit 1
          fi

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          git clone --bare "https://x-access-token:${MIRROR_TOKEN}@github.com/${SOURCE_REPO}.git" "$tmp/source.git"
          cd "$tmp/source.git"

          git remote add target "https://x-access-token:${MIRROR_TOKEN}@github.com/${TARGET_REPO}.git"

          git fetch origin --prune --tags

          # Mirror all branches and tags exactly.
          # + = force update, --prune = delete target refs missing in source.
          git push --prune target \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'

          source_main="$(git rev-parse refs/heads/main)"
          target_main="$(git ls-remote target refs/heads/main | awk '{print $1}')"

          if [ "$source_main" != "$target_main" ]; then
            echo "::error::main mismatch after mirror: source=$source_main target=$target_main"
            exit 1
          fi

          echo "Org mirror is now identical to personal repo for heads/tags."
