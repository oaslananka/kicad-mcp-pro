name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    name: Gitleaks
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Scan for secrets
        run: |
          go run github.com/zricethezav/gitleaks/v8@v8.30.0 detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose
