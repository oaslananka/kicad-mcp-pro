name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-release-draft:
    name: Release Drafter
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
