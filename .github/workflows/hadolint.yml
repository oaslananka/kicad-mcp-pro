name: Docker Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hadolint:
    name: Hadolint
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.kicad10
          failure-threshold: error

  compose:
    name: Compose Validation
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: docker compose config --quiet
