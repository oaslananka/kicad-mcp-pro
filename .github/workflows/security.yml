name: Security

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Explain execution mode
        run: echo "GitHub Actions is manual-only. Azure DevOps is the primary CI/CD system for this repository."
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras --frozen
      - run: uv run python -m bandit -r src/ -ll

      - name: Safety Action scan (API key)
        if: env.SAFETY_API_KEY != ''
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ env.SAFETY_API_KEY }}

      - name: Dependency audit fallback (no API key)
        if: env.SAFETY_API_KEY == ''
        run: uv run python -m pip_audit --skip-editable --progress-spinner off
