name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: Security
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Explain execution mode
        run: |
          echo "Automatic GitHub security CI/CD is owned by oaslananka-lab."
          echo "Personal GitHub, Azure DevOps, and GitLab are manual fallback surfaces."
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: corepack npm ci
      - run: uv sync --all-extras --frozen --python 3.12
      - run: corepack npm run security:bandit
      - name: Enforced dependency audit
        run: corepack npm run security:audit

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Optional Safety scan via Doppler
        run: |
          set +e
          # shellcheck disable=SC2016
          doppler run --project all --config main -- sh -c 'uv run --python 3.12 python -m safety --stage cicd --key "$SAFETY_API_KEY" scan --target .'
          safety_exit=$?
          set -e
          if [ "${safety_exit}" -ne 0 ]; then
            echo "Safety scan could not complete cleanly (exit ${safety_exit}); pip-audit remains the enforced dependency gate."
          fi
