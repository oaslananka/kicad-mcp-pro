name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v3.0.3"
        required: true
      index:
        description: "Package index"
        type: choice
        default: "TestPyPI"
        options:
          - TestPyPI
          - PyPI
      publish:
        description: "Actually publish to registries"
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      approval:
        description: "Type APPROVE_RELEASE to confirm publishing"
        required: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ inputs.version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate approval
        env:
          RELEASE_PUBLISH: ${{ inputs.publish }}
          RELEASE_APPROVAL: ${{ inputs.approval }}
        run: |
          if [ "${RELEASE_PUBLISH}" = "true" ] && [ "${RELEASE_APPROVAL}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: npm

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          python-version: "3.12"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: stable
          cache: false

      - name: Install workflow lint tools
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Verify required release secrets
        env:
          RELEASE_INDEX: ${{ inputs.index }}
          RELEASE_PUBLISH: ${{ inputs.publish }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${RELEASE_PUBLISH}" != "true" ]; then
            echo "Publish disabled; release token check skipped."
            exit 0
          fi
          case "${RELEASE_INDEX}" in
            PyPI) required_secret="PYPI_TOKEN" ;;
            TestPyPI) required_secret="TEST_PYPI_TOKEN" ;;
            *)
              echo "Unsupported release index: ${RELEASE_INDEX}" >&2
              exit 1
              ;;
          esac
          if [ -z "${!required_secret:-}" ]; then
            echo "Missing required GitHub Actions secret: ${required_secret}" >&2
            exit 1
          fi
          echo "Required release secret is configured: ${required_secret}."

      - name: Install dependencies
        run: |
          corepack enable
          corepack npm ci
          uv sync --all-extras --frozen

      - name: Test
        run: corepack npm run check:ci

      - name: Build
        run: corepack npm run build

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bom.json
          upload-artifact: false

      - name: Calculate checksums
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt

      - name: Clear project virtualenv for signing action
        run: |
          rm -rf .venv

      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        env:
          # The project setup-uv step exports Python 3.12 settings for package
          # checks. The pinned Sigstore action bootstraps its own Python 3.14
          # environment, so isolate uv to keep the action self-contained.
          UV_CACHE_DIR: ${{ runner.temp }}/sigstore-uv-cache
          UV_PYTHON: "3.14"
          UV_PYTHON_INSTALL_DIR: ${{ runner.temp }}/sigstore-uv-python-dir
          VIRTUAL_ENV: ""
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt
          upload-signing-artifacts: true

      - name: Publish
        if: inputs.publish == 'true'
        env:
          RELEASE_INDEX: ${{ inputs.index }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: bash scripts/publish.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ inputs.version }}
          path: dist/
          retention-days: 14

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_PUBLISH: ${{ inputs.publish }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          release_args=(
            --repo "${RELEASE_REPOSITORY}"
            --title "${RELEASE_VERSION}"
            --generate-notes
          )
          create_args=(
            "${release_args[@]}"
            --target "$target_sha"
          )
          if [ "${RELEASE_PUBLISH}" != "true" ]; then
            release_args+=(--draft)
            create_args+=(--draft)
          else
            release_args+=(--draft=false)
          fi
          assets=()
          if compgen -G "dist/*" > /dev/null; then
            assets+=(dist/*)
          fi
          if gh release view "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_VERSION}" "${release_args[@]}"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" "${assets[@]}" --clobber
            fi
          else
            gh release create "${RELEASE_VERSION}" "${create_args[@]}" "${assets[@]}"
          fi
