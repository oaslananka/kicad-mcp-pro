name: Sync Labels

on:
  workflow_dispatch:
  schedule:
    - cron: "12 5 * * 1"

jobs:
  sync:
    name: Sync Labels
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install YAML parser
        run: python -m pip install --upgrade pyyaml
      - name: Sync GitHub labels
        shell: bash
        run: |
          python - <<'PY' > /tmp/kicad-mcp-labels.json
          import json
          from pathlib import Path

          import yaml

          labels = yaml.safe_load(Path(".github/labels.yml").read_text(encoding="utf-8"))
          print(json.dumps(labels))
          PY

          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          labels = json.loads(Path("/tmp/kicad-mcp-labels.json").read_text(encoding="utf-8"))
          repo = os.environ["GITHUB_REPOSITORY"]
          for label in labels:
              name = label["name"]
              raw_color = label["color"]
              color = f"{raw_color:06x}" if isinstance(raw_color, int) else str(raw_color).lstrip("#")
              color = color.zfill(6)
              description = label.get("description", "")
              subprocess.run(
                  [
                      "gh",
                      "label",
                      "create",
                      name,
                      "--repo",
                      repo,
                      "--color",
                      color,
                      "--description",
                      description,
                      "--force",
                  ],
                  check=True,
              )
          PY
