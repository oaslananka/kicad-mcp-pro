name: Sync Labels

on:
  workflow_dispatch:
  schedule:
    - cron: "12 5 * * 1"

jobs:
  sync:
    name: Sync Labels
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install YAML parser
        run: python -m pip install --upgrade pyyaml
      - name: Sync GitHub labels
        shell: bash
        run: |
          python - <<'PY' > /tmp/kicad-mcp-labels.json
          import json
          from pathlib import Path

          import yaml

          labels = yaml.safe_load(Path(".github/labels.yml").read_text(encoding="utf-8"))
          print(json.dumps(labels))
          PY

          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          labels = json.loads(Path("/tmp/kicad-mcp-labels.json").read_text(encoding="utf-8"))
          repo = os.environ["GITHUB_REPOSITORY"]
          for label in labels:
              name = label["name"]
              color = str(label["color"]).lstrip("#")
              description = label.get("description", "")
              exists = subprocess.run(
                  ["gh", "label", "view", name, "--repo", repo],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  check=False,
              ).returncode == 0
              if exists:
                  subprocess.run(
                      [
                          "gh",
                          "label",
                          "edit",
                          name,
                          "--repo",
                          repo,
                          "--color",
                          color,
                          "--description",
                          description,
                      ],
                      check=True,
                  )
              else:
                  subprocess.run(
                      [
                          "gh",
                          "label",
                          "create",
                          name,
                          "--repo",
                          repo,
                          "--color",
                          color,
                          "--description",
                          description,
                      ],
                      check=True,
                  )
          PY
