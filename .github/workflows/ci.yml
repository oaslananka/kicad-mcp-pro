name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      HUSKY: 0
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6
      - name: Explain execution mode
        run: |
          echo "Automatic GitHub CI/CD is owned by oaslananka-lab."
          echo "Personal GitHub, Azure DevOps, and GitLab are manual fallback surfaces."
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: corepack enable
      - run: corepack npm ci
      - run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}
      - name: Lint
        run: corepack npm run lint
      - name: Typecheck
        run: corepack npm run typecheck
      - name: Unit tests
        if: matrix.os != 'ubuntu-latest'
        run: corepack npm run test:unit
      - name: Full test suite
        if: matrix.os == 'ubuntu-latest'
        run: corepack npm run test
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Lint tool metadata
        if: matrix.os == 'ubuntu-latest'
        run: uv run python -m pytest tests/unit/test_tool_metadata_lint.py -q
      - name: Check profile coverage
        if: matrix.os == 'ubuntu-latest'
        run: uv run python -m pytest tests/unit/test_router_profiles.py tests/unit/test_profile_matrix.py -q
      - name: Validate callable imports
        if: matrix.os == 'ubuntu-latest'
        run: uv run python -m pytest tests/unit/test_fixers.py::test_all_callable_imports_resolve -q
      - name: Benchmark latency gate
        if: matrix.os == 'ubuntu-latest'
        env:
          KICAD_MCP_BENCHMARK_JSON: reports/benchmark-latency-${{ matrix.python-version }}.json
        run: uv run python -m pytest tests/ -m benchmark -q
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' && always()
        with:
          name: benchmark-latency-${{ matrix.python-version }}
          path: reports/benchmark-latency-${{ matrix.python-version }}.json
          if-no-files-found: ignore
          retention-days: 14

  ci:
    name: CI
    if: always() && (github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs:
      - validate
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "CI matrix failed: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "CI matrix passed."
