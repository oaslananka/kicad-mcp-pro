name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      HUSKY: 0
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          corepack enable
          corepack npm ci
          uv sync --all-extras --frozen
      - name: Run full CI tasks
        if: matrix.os == 'ubuntu-latest'
        run: corepack npm run check:ci
      - name: Run cross-platform smoke tasks
        if: matrix.os != 'ubuntu-latest'
        run: |
          corepack npm run check:metadata
          corepack npm run lint
          corepack npm run format:check
          corepack npm run typecheck
          corepack npm run test:unit
      - name: Install Doppler CLI
        if: matrix.os == 'ubuntu-latest'
        uses: dopplerhq/cli-action@v4
      - name: Load Codecov token from Doppler
        if: matrix.os == 'ubuntu-latest'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          token="$(doppler secrets get CODECOV_TOKEN --plain --project all --config main || true)"
          if [ -n "$token" ]; then
            echo "::add-mask::$token"
            echo "CODECOV_TOKEN=$token" >> "$GITHUB_ENV"
          fi
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}
      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/junit.xml
            **/test-results.xml
      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        uses: test-summary/action@v2
        with:
          paths: "**/junit.xml"

  ci:
    name: CI
    if: always() && github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    needs:
      - validate
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "CI matrix failed: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "CI matrix passed."
