# ──────────────────────────────────────────────────────────────────────────────
# kicad-mcp-pro · Azure Pipelines — Lean CI
#
# Cost-optimized default:
# - single OS
# - single Python version
# - no matrix expansion
# - no separate security job here
#
# If broader validation is needed later, expand this pipeline manually.
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .azure/pipelines/**
      - .github/workflows/**
      - Dockerfile
      - docker-compose.yml

pr:
  autoCancel: true
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .azure/pipelines/**
      - .github/workflows/**
      - Dockerfile
      - docker-compose.yml

jobs:
  - job: Validate
    displayName: 'Validate · Ubuntu · Python 3.12'
    pool:
      vmImage: ubuntu-22.04
    timeoutInMinutes: 30

    steps:
      - checkout: self
        fetchDepth: 1

      - bash: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "##vso[task.prependpath]$HOME/.local/bin"
          echo "##vso[task.prependpath]$HOME/.cargo/bin"
        displayName: 'Install uv'

      - script: uv python install 3.12
        displayName: 'Install Python 3.12'

      - script: uv sync --all-extras
        displayName: 'Install dependencies'

      - script: uv run ruff check src/ tests/
        displayName: 'Lint · ruff'

      - script: uv run python -m mypy src/kicad_mcp/
        displayName: 'Type check · mypy'

      - script: >
          uv run python -m pytest tests/unit/ tests/integration/ tests/e2e/ -q
          --cov=kicad_mcp
          --cov-report=term-missing
          --cov-fail-under=80
        displayName: 'Run tests'
