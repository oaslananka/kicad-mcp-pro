# ──────────────────────────────────────────────────────────────────────────────
# kicad-mcp-pro · Azure Pipelines — Security
#
# Manual-only by design to avoid background CI/CD cost.
# Run this pipeline on demand when preparing a release or auditing dependencies.
# ──────────────────────────────────────────────────────────────────────────────

trigger: none
pr: none

jobs:
  - job: SecurityAudit
    displayName: "Security Audit (manual)"
    pool:
      vmImage: ubuntu-22.04
    timeoutInMinutes: 30
    variables:
      UV_CACHE_DIR: $(Pipeline.Workspace)/.uv-cache

    steps:
      - checkout: self
        fetchDepth: 1

      - bash: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "##vso[task.prependpath]$HOME/.local/bin"
          echo "##vso[task.prependpath]$HOME/.cargo/bin"
        displayName: "Install uv"

      - task: Cache@2
        displayName: "Restore uv cache"
        inputs:
          key: 'uv | "$(Agent.OS)" | uv.lock'
          restoreKeys: |
            uv | "$(Agent.OS)"
          path: $(UV_CACHE_DIR)

      - script: uv sync --all-extras --frozen
        displayName: "Install dependencies"

      - script: |
          uv run python -m bandit \
            -r src/ \
            -ll \
            -f json \
            -o bandit-report.json \
            --exit-zero
        displayName: "SAST · bandit (src/)"

      - script: |
          if [ -n "${SAFETY_API_KEY:-}" ]; then
            timeout 15m uv run python -m safety \
              --stage cicd \
              --key "${SAFETY_API_KEY}" \
              scan \
              --target . \
              --output json \
              --continue-on-error \
              2>&1 | tee safety-report.json || true
          else
            echo "SAFETY_API_KEY not set; running pip-audit fallback."
            timeout 15m uv run python -m pip_audit \
              --skip-editable \
              --progress-spinner off \
              --format json \
              --output safety-report.json
          fi
        displayName: "SCA · safety (dependencies)"
        env:
          SAFETY_API_KEY: $(SAFETY_API_KEY)

      - script: uv cache prune --ci || true
        displayName: "Prune uv cache (CI)"
        condition: always()

      - task: PublishBuildArtifacts@1
        displayName: "Publish bandit report"
        condition: always()
        inputs:
          pathtoPublish: bandit-report.json
          artifactName: security-bandit

      - task: PublishBuildArtifacts@1
        displayName: "Publish safety report"
        condition: always()
        inputs:
          pathtoPublish: safety-report.json
          artifactName: security-safety
